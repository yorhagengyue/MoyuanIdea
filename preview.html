<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Assessment Preview</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 20px; background: #f3f5f7; }
    h1 { margin: 0 0 12px; font-size: 20px; }
    .card { background: #fff; border: 1px solid #d8dee6; border-radius: 10px; padding: 12px; overflow: auto; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
    table { border-collapse: collapse; font-size: 12px; }
    td, th { border: 1px solid #222; min-width: 28px; padding: 4px 6px; vertical-align: middle; }
    .hint { color: #555; margin-top: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Risk Assessment Template (Web Preview)</h1>
  <div class="card" id="sheet">Loading...</div>
  <div class="hint">Source: /Risk_Assessment_Template.xlsx</div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    (async function () {
      const mount = document.getElementById('sheet');
      try {
        const res = await fetch('/Risk_Assessment_Template.xlsx');
        if (!res.ok) throw new Error('Failed to fetch xlsx: ' + res.status);
        const ab = await res.arrayBuffer();
        const wb = XLSX.read(ab, { type: 'array', cellStyles: true });
        const name = wb.SheetNames[0];
        const ws = wb.Sheets[name];
        const html = XLSX.utils.sheet_to_html(ws, { editable: false, id: 'excel' });
        mount.innerHTML = html;
      } catch (err) {
        mount.textContent = 'Error: ' + err.message;
      }
    })();
  </script>
</body>
</html>
